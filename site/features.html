<!DOCTYPE html>
<html lang="ja" data-page="features">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraLingo | Features</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand-wrap" href="./index.html" aria-label="TraLingo Home">
        <img class="brand-mark" src="./assets/logo.svg" alt="TraLingo" />
        <div class="brand-copy">
          <div class="brand-name">TraLingo</div>
          <div class="brand-tag" data-i18n="brand_tag"></div>
        </div>
      </a>
      <nav class="nav-links">
        <a href="./index.html" data-i18n="nav_home"></a>
        <a href="./features.html" data-i18n="nav_features"></a>
        <a href="./docs.html" data-i18n="nav_docs"></a>
        <a href="https://github.com/nococoanolife/TraLingo/releases/latest" target="_blank" rel="noreferrer" data-i18n="nav_download"></a>
        <a href="https://github.com/nococoanolife/TraLingo" target="_blank" rel="noreferrer" data-i18n="nav_github"></a>
      </nav>
      <div class="lang-switcher">
        <button data-lang="ja">🇯🇵 日本語</button>
        <button data-lang="en">🇺🇸 English</button>
        <button data-lang="ko">🇰🇷 한국어</button>
        <button data-lang="zh">🇨🇳 简体中文</button>
      </div>
    </header>

    <main class="legal-main">
      <section class="section-intro">
        <div class="eyebrow" data-i18n="features_eyebrow"></div>
        <h1 data-i18n="features_title"></h1>
        <p class="lede" data-i18n="features_intro"></p>
      </section>

      <section class="feature-detail-grid">
        <article class="feature-detail-card">
          <h3 data-i18n="features_card_1_title"></h3>
          <p data-i18n="features_card_1_body"></p>
        </article>
        <article class="feature-detail-card">
          <h3 data-i18n="features_card_2_title"></h3>
          <p data-i18n="features_card_2_body"></p>
        </article>
        <article class="feature-detail-card">
          <h3 data-i18n="features_card_3_title"></h3>
          <p data-i18n="features_card_3_body"></p>
        </article>
        <article class="feature-detail-card">
          <h3 data-i18n="features_card_4_title"></h3>
          <p data-i18n="features_card_4_body"></p>
        </article>
        <article class="feature-detail-card">
          <h3 data-i18n="features_card_5_title"></h3>
          <p data-i18n="features_card_5_body"></p>
        </article>
        <article class="feature-detail-card">
          <h3 data-i18n="features_card_6_title"></h3>
          <p data-i18n="features_card_6_body"></p>
        </article>
      </section>

      <section class="screenshot-section">
        <div class="section-intro compact">
          <div class="eyebrow" data-i18n="screenshots_eyebrow"></div>
          <h2 data-i18n="screenshots_title"></h2>
          <p data-i18n="screenshots_body"></p>
        </div>
        <div class="screenshot-grid">
          <div class="shot-placeholder" data-i18n="screenshots_slot_1"></div>
          <div class="shot-placeholder" data-i18n="screenshots_slot_2"></div>
          <div class="shot-placeholder" data-i18n="screenshots_slot_3"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-links">
        <a href="./tokusho.html" data-i18n="nav_tokusho"></a>
        <a href="./privacy.html" data-i18n="nav_privacy"></a>
        <a href="./terms.html" data-i18n="nav_terms"></a>
      </div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
