<!DOCTYPE html>

  <body>
    <header class="site-header">
      <a class="brand-wrap" href="./index.html" aria-label="TraLingo Home">
        <img class="brand-mark" src="./assets/logo.svg" alt="TraLingo" />
        <div class="brand-copy">
          <div class="brand-name">TraLingo</div>
          <div class="brand-tag" data-i18n="brand_tag"></div>
        </div>
      </a>
      <nav class="nav-links">
        <a href="./index.html" data-i18n="nav_home"></a>
        <a href="./features.html" data-i18n="nav_features"></a>

      </nav>
      <div class="lang-switcher">
        <button data-lang="ja">🇯🇵 日本語</button>
        <button data-lang="en">🇺🇸 English</button>
        <button data-lang="ko">🇰🇷 한국어</button>
        <button data-lang="zh">🇨🇳 简体中文</button>

    <main class="legal-main">

      </section>

      <section class="legal-page">
        <article class="legal-card">
          <dl>
            <dt data-i18n="tokusho_seller">販売事業者</dt>
            <dd data-i18n="tokusho_seller_value">TraLingo Project / nococoanolife</dd>
            <dt data-i18n="tokusho_operator">運営責任者</dt>
            <dd data-i18n="tokusho_operator_value">nococoanolife</dd>
            <dt data-i18n="tokusho_address">所在地</dt>
            <dd data-i18n="tokusho_address_value">請求があったら遅滞なく開示します。</dd>
            <dt data-i18n="tokusho_phone">電話番号</dt>
            <dd data-i18n="tokusho_phone_value">請求があったら遅滞なく開示します。</dd>
            <dt data-i18n="tokusho_contact">問い合わせ先</dt>
            <dd><a href="https://github.com/nococoanolife/TraLingo/issues" target="_blank" rel="noreferrer" data-i18n="tokusho_contact_value">GitHub Issues: https://github.com/nococoanolife/TraLingo/issues</a></dd>
            <dt data-i18n="tokusho_service_label"></dt>
            <dd data-i18n="tokusho_service_value"></dd>

      <div class="footer-links">
        <a href="./tokusho.html" data-i18n="nav_tokusho"></a>
        <a href="./privacy.html" data-i18n="nav_privacy"></a>
