<!DOCTYPE html>
<html lang="ja" data-page="docs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraLingo | Docs</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand-wrap" href="./index.html" aria-label="TraLingo Home">
        <img class="brand-mark" src="./assets/logo.svg" alt="TraLingo" />
        <div class="brand-copy">
          <div class="brand-name">TraLingo</div>
          <div class="brand-tag" data-i18n="brand_tag"></div>

      </a>
      <nav class="nav-links">

        <a href="./features.html" data-i18n="nav_features"></a>
        <a href="./docs.html" data-i18n="nav_docs"></a>
        <a href="https://github.com/nococoanolife/TraLingo/releases/latest" target="_blank" rel="noreferrer" data-i18n="nav_download"></a>
        <a href="https://github.com/nococoanolife/TraLingo" target="_blank" rel="noreferrer" data-i18n="nav_github"></a>
      </nav>
      <div class="lang-switcher">

        <button data-lang="zh">🇨🇳 简体中文</button>

        <article class="step-card">

        <article class="step-card">

          <span class="story-step">6</span>

          <p data-i18n="docs_step_6_body"></p>

      <div class="footer-links">
        <a href="./tokusho.html" data-i18n="nav_tokusho"></a>
        <a href="./privacy.html" data-i18n="nav_privacy"></a>
