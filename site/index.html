<!DOCTYPE html>
<html lang="ja" data-page="home">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraLingo</title>
    <meta
      name="description"
      content="TraLingo is a macOS app for live transcription, translation, summary generation, and export."
    />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand-wrap" href="./index.html" aria-label="TraLingo Home">
        <img class="brand-mark" src="./assets/logo.svg" alt="TraLingo" />
        <div class="brand-copy">
          <div class="brand-name">TraLingo</div>
          <div class="brand-tag" data-i18n="brand_tag"></div>
        </div>
      </a>

      <nav class="nav-links">
        <a href="./index.html" data-i18n="nav_home"></a>
        <a href="./features.html" data-i18n="nav_features"></a>
        <a href="./docs.html" data-i18n="nav_docs"></a>
        <a href="https://github.com/nococoanolife/TraLingo/releases/latest" target="_blank" rel="noreferrer" data-i18n="nav_download"></a>
        <a href="https://github.com/nococoanolife/TraLingo" target="_blank" rel="noreferrer" data-i18n="nav_github"></a>
      </nav>

      <div class="lang-switcher">
        <button data-lang="ja">🇯🇵 日本語</button>
        <button data-lang="en">🇺🇸 English</button>
        <button data-lang="ko">🇰🇷 한국어</button>
        <button data-lang="zh">🇨🇳 简体中文</button>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <div class="hero-copy">
          <div class="eyebrow" data-i18n="home_eyebrow"></div>
          <h1 data-i18n="home_title"></h1>
          <p class="lede" data-i18n="home_lede"></p>

          <div class="hero-points">
            <span data-i18n="home_point_1"></span>
            <span data-i18n="home_point_2"></span>
            <span data-i18n="home_point_3"></span>
          </div>

          <div class="cta-row">
            <a class="button primary" href="https://github.com/nococoanolife/TraLingo/releases/latest" target="_blank" rel="noreferrer" data-i18n="home_cta_primary"></a>
            <a class="button secondary" href="https://github.com/nococoanolife/TraLingo" target="_blank" rel="noreferrer" data-i18n="home_cta_secondary"></a>
          </div>
        </div>

        <div class="hero-shot" aria-label="TraLingo UI preview">
          <figure class="screenshot-frame">
            <img class="screenshot-image zoomable-image" src="./assets/screenshots/home-main&summary.png" alt="TraLingo home screen" />
          </figure>
        </div>
      </section>

      <section class="origin-section">
        <div class="section-intro compact">
          <div class="eyebrow" data-i18n="origin_eyebrow"></div>
          <h2 data-i18n="origin_title"></h2>
        </div>
        <div class="origin-grid">
          <article class="feature-detail-card">
            <p data-i18n="origin_body_1"></p>
          </article>
          <article class="feature-detail-card">
            <p data-i18n="origin_body_2"></p>
          </article>
        </div>
      </section>

      <section class="story">
        <div class="section-intro">
          <div class="eyebrow" data-i18n="story_eyebrow"></div>
          <h2 data-i18n="home_story_title"></h2>
        </div>

        <div class="story-grid">
          <article class="story-card">
            <span class="story-step">1</span>
            <h3 data-i18n="home_story_1_title"></h3>
            <p data-i18n="home_story_1_body"></p>
          </article>
          <article class="story-card">
            <span class="story-step">2</span>
            <h3 data-i18n="home_story_2_title"></h3>
            <p data-i18n="home_story_2_body"></p>
          </article>
          <article class="story-card">
            <span class="story-step">3</span>
            <h3 data-i18n="home_story_3_title"></h3>
            <p data-i18n="home_story_3_body"></p>
          </article>
        </div>
      </section>

      <section class="feature-strip">
        <article class="feature-card">
          <h3 data-i18n="home_feature_1_title"></h3>
          <p data-i18n="home_feature_1_body"></p>
          <figure class="inline-shot">
            <img class="screenshot-image" src="./assets/screenshots/home-live-translation.png" alt="TraLingo realtime transcription and translation" />
          </figure>
        </article>
        <article class="feature-card">
          <h3 data-i18n="home_feature_2_title"></h3>
          <p data-i18n="home_feature_2_body"></p>
        </article>
        <article class="feature-card">
          <h3 data-i18n="home_feature_3_title"></h3>
          <p data-i18n="home_feature_3_body"></p>
          <figure class="inline-shot">
            <img class="screenshot-image" src="./assets/screenshots/home-summary.png" alt="TraLingo summary panel" />
          </figure>
        </article>
      </section>

      <section class="download-grid">
        <article class="download-panel">
          <div class="download-copy">
            <div class="eyebrow" data-i18n="nav_download"></div>
            <h2 data-i18n="home_download_title"></h2>
            <p data-i18n="home_download_body"></p>
          </div>

          <div class="download-actions">
            <a class="button primary" href="https://github.com/nococoanolife/TraLingo/releases/latest" target="_blank" rel="noreferrer" data-i18n="home_download_primary"></a>
            <a class="button secondary" href="https://github.com/nococoanolife/TraLingo" target="_blank" rel="noreferrer" data-i18n="home_download_secondary"></a>
          </div>
        </article>

        <article class="support-panel">
          <div class="eyebrow" data-i18n="support_eyebrow"></div>
          <h2 data-i18n="support_title"></h2>
          <p data-i18n="support_body"></p>
          <a class="button secondary" href="https://buymeacoffee.com/nococoanolife" target="_blank" rel="noreferrer" data-i18n="support_button"></a>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-links">
        <a href="./tokusho.html" data-i18n="nav_tokusho"></a>
        <a href="./privacy.html" data-i18n="nav_privacy"></a>
        <a href="./terms.html" data-i18n="nav_terms"></a>
      </div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
