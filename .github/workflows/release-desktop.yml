name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TraLingo.dmg
